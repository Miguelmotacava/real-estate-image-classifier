services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: real-estate-classifier-api:latest
    container_name: real-estate-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro
      - ./reports:/app/reports:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    image: real-estate-classifier-ui:latest
    container_name: real-estate-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
